<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서버 장애처리 · 디스크 관리 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
:root{--green:#0D996A;--green-light:#e3f5ee;--gray:#4C4C4C;--amber:#e0a531;--red:#d64550;--bg:#f5f6f7;}
*{box-sizing:border-box;}
body{font-family:-apple-system,'Malgun Gothic',sans-serif;background:var(--bg);margin:0;color:#222;}
.gate-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0D996A,#0a7350);}
.gate-box{background:#fff;padding:40px;border-radius:12px;width:320px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.2);}
.gate-box input{width:100%;padding:10px;margin:16px 0;border:1px solid #ccc;border-radius:6px;}
.gate-box button{width:100%;padding:10px;background:var(--green);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600;}
.gate-err{color:var(--red);font-size:13px;min-height:18px;}
header.hd{background:linear-gradient(135deg,#0D996A,#0a7350);color:#fff;padding:20px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.brand{font-size:20px;font-weight:700;letter-spacing:.5px;}
.hd-right{display:flex;align-items:center;gap:10px;}
.badge{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);padding:4px 10px;border-radius:20px;font-size:12px;}
.badge.update{background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.35);}
h1{font-size:22px;margin:20px 28px 4px;}
.tabs{display:flex;gap:8px;margin:0 28px 16px;}
.tab-btn{padding:8px 18px;border:1px solid var(--green);background:#fff;color:var(--green);border-radius:20px;cursor:pointer;font-weight:600;}
.tab-btn.active{background:var(--green);color:#fff;}
.tab-panel{display:none;padding:0 28px 40px;}
.tab-panel.active{display:block;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
.kpi-card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.kpi-label{font-size:13px;color:var(--gray);}
.kpi-value{font-size:26px;font-weight:700;color:var(--green);}
.kpi-value .unit{font-size:13px;font-weight:400;color:var(--gray);margin-left:2px;}
.kpi-sub{font-size:12px;color:#888;margin-top:4px;}
.section-title{font-size:16px;font-weight:700;border-bottom:2px solid var(--green);padding-bottom:8px;margin:28px 0 14px;}
.section-num{color:var(--green);margin-right:6px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.card-title{font-weight:600;margin-bottom:10px;font-size:14px;}
.desc{font-size:12px;color:#888;margin-bottom:8px;}
.scroll-table{max-height:400px;overflow-y:auto;margin-top:10px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
th,td{padding:6px 8px;border-bottom:1px solid #eee;text-align:left;}
th{color:var(--gray);position:sticky;top:0;background:#fff;}
.tag{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.tag.green{background:var(--green-light);color:var(--green);}
.tag.amber{background:#fbf1de;color:var(--amber);}
.tag.red{background:#fbe6e7;color:var(--red);}
.tag.gray{background:#eee;color:var(--gray);}
footer{padding:20px 28px;font-size:12px;color:#999;}
@media(max-width:900px){.kpi-grid{grid-template-columns:1fr 1fr;}.grid2{grid-template-columns:1fr;}}
</style>
</head>

<div id="gate-wrap" class="gate-wrap">

    <div style="font-size:13px;color:#888;">비밀번호를 입력해주세요</div>
    <input type="password" id="gate-pw" placeholder="비밀번호">
    <button id="gate-btn">확인</button>
    <div class="gate-err" id="gate-err"></div>

</div>

async function b64ToBuf(b64){const bin=atob(b64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr.buffer;}
async function tryDecrypt(pw){
  const enc=new TextEncoder();
  const salt=await b64ToBuf(PAYLOAD.salt);
  const iv=await b64ToBuf(PAYLOAD.iv);
  const ct=await b64ToBuf(PAYLOAD.ciphertext);
  const keyMaterial=await crypto.subtle.importKey('raw',enc.encode(pw),{name:'PBKDF2'},false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:new Uint8Array(salt),iterations:PAYLOAD.iterations,hash:'SHA-256'},keyMaterial,{name:'AES-GCM',length:256},false,['decrypt']);
  const plainBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(iv)},key,ct);
  return new TextDecoder().decode(plainBuf);
}
async function unlock(){
  const pw=document.getElementById('gate-pw').value;
  const errEl=document.getElementById('gate-err');
  try{
    const html=await tryDecrypt(pw);
    document.getElementById('gate-wrap').style.display='none';
    const root=document.getElementById('content-root');
    root.style.display='block';
    root.innerHTML=html;
    Array.from(root.querySelectorAll('script')).forEach(old=>{
      const s=document.createElement('script');
      if(old.src)s.src=old.src; else s.textContent=old.textContent;
      old.parentNode.replaceChild(s,old);
    });
  }catch(e){
    errEl.textContent='비밀번호가 올바르지 않습니다.';
  }
}
document.getElementById('gate-btn').addEventListener('click',unlock);
document.getElementById('gate-pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
