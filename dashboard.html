<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>서버 장애처리 · 디스크 관리 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
:root {
  --green: #0D996A;
  --green-light: #e3f5ee;
  --gray: #4C4C4C;
  --amber: #e0a531;
  --red: #c65b5b;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
  background: #f5f6f7;
  color: #222;
}
#gate {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--gray), #2a2a2a);
}
.gate-box {
  background: #fff;
  border-radius: 12px;
  padding: 40px 36px;
  width: 320px;
  text-align: center;
  box-shadow: 0 12px 32px rgba(0,0,0,0.25);
}
.gate-box h2 { margin: 0 0 20px; font-size: 18px; color: var(--gray); }
.gate-box input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
  margin-bottom: 12px;
}
.gate-box button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 6px;
  background: var(--green);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
}
.gate-box button:hover { opacity: 0.9; }
.gate-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

#content-root { max-width: 1200px; margin: 0 auto; padding: 24px; }

.dash-header {
  background: var(--gray);
  color: #fff;
  padding: 24px 28px;
  border-radius: 12px;
  margin-bottom: 20px;
}
.brand-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.logo { height: 28px; }
.brand { font-size: 18px; font-weight: 700; letter-spacing: 0.5px; }
.brand-sub { font-size: 13px; opacity: 0.8; }
.badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 999px;
  border: 1px solid transparent;
}
.badge.draft { background: rgba(224,165,49,0.25); color: #f2c265; border-color: rgba(224,165,49,0.5); }
.badge.updated { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.35); }
.dash-header h1 { font-size: 22px; margin: 14px 0 0; }

.tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.tab-btn {
  padding: 10px 20px;
  border: 1px solid #ddd;
  background: #fff;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  color: var(--gray);
}
.tab-btn.active { background: var(--green); color: #fff; border-color: var(--green); }
.tab-content { display: none; }
.tab-content.active { display: block; }

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
.kpi-card { background: #fff; border-radius: 10px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.kpi-label { font-size: 12px; color: #888; margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 700; color: var(--gray); }
.kpi-value .unit { font-size: 13px; font-weight: 400; margin-left: 2px; color: #888; }
.kpi-sub { font-size: 11px; color: var(--green); margin-top: 6px; }

.section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--gray);
  border-bottom: 2px solid var(--green);
  padding-bottom: 8px;
  margin: 28px 0 14px;
}
.section-num { color: var(--green); margin-right: 4px; }

.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { background: #fff; border-radius: 10px; padding: 16px 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.card-title { font-size: 13px; font-weight: 700; color: var(--gray); margin-bottom: 10px; }
.card-desc { font-size: 11px; color: #888; margin-bottom: 10px; }
.scroll-card { max-height: 480px; overflow-y: auto; }

.data-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 8px; }
.data-table th, .data-table td { padding: 6px 8px; border-bottom: 1px solid #eee; text-align: left; }
.data-table th { color: #888; font-weight: 600; background: #fafafa; position: sticky; top: 0; }

.tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
.tag.green { background: var(--green-light); color: var(--green); }
.tag.amber { background: #fbf1de; color: var(--amber); }
.tag.red { background: #fbeaea; color: var(--red); }
.tag.gray { background: #eee; color: var(--gray); }

.footer-note { font-size: 11px; color: #999; margin-top: 30px; padding-top: 16px; border-top: 1px solid #ddd; }

@media (max-width: 720px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .grid2 { grid-template-columns: 1fr; }
}

</style>
</head>

    <h2>서버 장애처리 · 디스크 관리 대시보드</h2>

    <div class="gate-error" id="gate-error">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

function b64ToBuf(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: PAYLOAD.iterations, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
}

async function tryDecrypt(password) {
  const salt = b64ToBuf(PAYLOAD.salt);
  const iv = b64ToBuf(PAYLOAD.iv);
  const ciphertext = b64ToBuf(PAYLOAD.ciphertext);
  const key = await deriveKey(password, salt);
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return new TextDecoder().decode(decrypted);
}

function runScripts(container) {
  const scripts = container.querySelectorAll('script');
  scripts.forEach(function (old) {
    const s = document.createElement('script');
    if (old.type) s.type = old.type;
    if (old.type === 'application/json') {
      s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
      return;
    }
    s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
}

async function unlock() {
  const pw = document.getElementById('gate-pw').value;
  try {
    const html = await tryDecrypt(pw);
    const root = document.getElementById('content-root');
    root.innerHTML = html;
    document.getElementById('gate').style.display = 'none';
    root.style.display = 'block';
    runScripts(root);
  } catch (e) {
    document.getElementById('gate-error').style.display = 'block';
  }
}

document.getElementById('gate-btn').addEventListener('click', unlock);
document.getElementById('gate-pw').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') unlock();
});
