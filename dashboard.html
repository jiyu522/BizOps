<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서버 장애처리 · 디스크 관리 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>
:root{
  --green:#0D996A; --green-light:#e4f5ee; --gray:#4C4C4C; --gray-light:#f2f2f2;
  --amber:#e0a531; --amber-light:#fbf1de; --red:#c94b4b; --red-light:#fbe7e7;
  --gray-tag-bg:#eceded; --gray-tag-text:#6b6b6b;
  --bg:#f7f8f9; --card-bg:#ffffff; --border:#e5e7eb; --text:#222; --text-sub:#6b7280;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);}
#gate-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0D996A 0%,#4C4C4C 100%);}
.gate-box{background:#fff;padding:48px 40px;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.25);text-align:center;width:340px;}
.gate-box h2{margin:0 0 8px;font-size:20px;color:var(--gray);}
.gate-box p{margin:0 0 24px;font-size:13px;color:var(--text-sub);}
.gate-box input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:12px;}
.gate-box button{width:100%;padding:12px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
.gate-box button:hover{background:#0b8560;}
.gate-error{color:var(--red);font-size:12px;margin-top:8px;display:none;}
header.dash-header{background:linear-gradient(135deg,#0D996A 0%,#0b7a56 100%);padding:24px 32px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
header.dash-header .brand{display:flex;align-items:center;gap:10px;}
header.dash-header .brand img{height:28px;}
header.dash-header .brand-sub{color:rgba(255,255,255,0.85);font-size:13px;font-weight:500;}
header.dash-header h1{color:#fff;font-size:20px;margin:0;width:100%;order:3;margin-top:8px;}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:0.5px;}
.badge.draft{background:#fff3cd;color:#8a6900;border:1px solid #f0d78c;}
.badge.updated{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.35);}
.tabs{display:flex;gap:8px;padding:16px 32px 0;background:var(--card-bg);border-bottom:1px solid var(--border);}
.tab-btn{padding:12px 20px;border:none;background:none;font-size:14px;font-weight:600;color:var(--text-sub);cursor:pointer;border-bottom:3px solid transparent;}
.tab-btn.active{color:var(--green);border-bottom-color:var(--green);}
.tab-panel{display:none;padding:24px 32px 48px;}
.tab-panel.active{display:block;}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.kpi-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.kpi-card .label{font-size:12px;color:var(--text-sub);margin-bottom:6px;}
.kpi-card .value{font-size:26px;font-weight:800;color:var(--gray);}
.kpi-card .value .unit{font-size:14px;font-weight:600;margin-left:2px;color:var(--text-sub);}
.kpi-card .sub{font-size:11px;color:var(--green);margin-top:4px;}
.section-title{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;color:var(--gray);margin:32px 0 16px;padding-bottom:8px;border-bottom:2px solid var(--green);}
.section-title .section-num{color:var(--green);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:18px 20px;}
.card h3{font-size:14px;margin:0 0 4px;color:var(--gray);}
.card .desc{font-size:11px;color:var(--text-sub);margin:0 0 12px;}
.card canvas{max-height:280px;}
.full-card{grid-column:1/-1;}
.scroll-card{max-height:400px;overflow-y:auto;}
table.data-table{width:100%;border-collapse:collapse;font-size:12px;}
table.data-table th{text-align:left;padding:8px 10px;background:var(--gray-light);color:var(--gray);font-weight:700;position:sticky;top:0;}
table.data-table td{padding:7px 10px;border-bottom:1px solid var(--border);}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;}
.tag.green{background:var(--green-light);color:var(--green);}
.tag.amber{background:var(--amber-light);color:var(--amber);}
.tag.red{background:var(--red-light);color:var(--red);}
.tag.gray{background:var(--gray-tag-bg);color:var(--gray-tag-text);}
footer.dash-footer{padding:20px 32px;font-size:11px;color:var(--text-sub);border-top:1px solid var(--border);background:var(--card-bg);}
footer.dash-footer p{margin:4px 0;}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr);}.grid2,.grid3{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="gate-screen">
  <div class="gate-box">
    <h2>서버 장애처리 · 디스크 관리 대시보드</h2>
    <p>비밀번호를 입력해 주세요</p>
    <input type="password" id="gate-pw" placeholder="Password" />
    <button id="gate-btn">확인</button>
    <div class="gate-error" id="gate-error">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>
<div id="content-root" style="display:none;"></div>

function b64ToBuf(b64){
  var bin = atob(b64);
  var bytes = new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++){ bytes[i] = bin.charCodeAt(i); }
  return bytes.buffer;
}
async function tryDecrypt(password){
  var enc = new TextEncoder();
  var salt = b64ToBuf(PAYLOAD.salt);
  var iv = b64ToBuf(PAYLOAD.iv);
  var ciphertext = b64ToBuf(PAYLOAD.ciphertext);
  var keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']);
  var key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: salt, iterations: PAYLOAD.iterations, hash:'SHA-256' },
    keyMaterial,
    { name:'AES-GCM', length:256 },
    false,
    ['decrypt']
  );
  var plainBuf = await crypto.subtle.decrypt({ name:'AES-GCM', iv: iv }, key, ciphertext);
  return new TextDecoder().decode(plainBuf);
}
function runScripts(container){
  var scripts = container.querySelectorAll('script');
  scripts.forEach(function(old){
    var s = document.createElement('script');
    if(old.src){ s.src = old.src; } else { s.textContent = old.textContent; }
    old.parentNode.replaceChild(s, old);
  });
}
async function unlock(){
  var pw = document.getElementById('gate-pw').value;
  var errEl = document.getElementById('gate-error');
  try{
    var html = await tryDecrypt(pw);
    var root = document.getElementById('content-root');
    root.innerHTML = html;
    document.getElementById('gate-screen').style.display = 'none';
    root.style.display = 'block';
    runScripts(root);
  }catch(e){
    errEl.style.display = 'block';
  }
}
document.getElementById('gate-btn').addEventListener('click', unlock);
document.getElementById('gate-pw').addEventListener('keydown', function(e){ if(e.key === 'Enter'){ unlock(); } });
