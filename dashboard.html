<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>서버 장애처리 · 디스크 관리 대시보드 (비밀번호 보호)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js"></script>
<style>

  :root{
    --green:#0D996A;
    --green-light:#e6f5ef;
    --gray:#4C4C4C;
    --gray-light:#8a8a8a;
    --bg:#f5f6f7;
    --card:#ffffff;
    --border:#e5e7eb;
    --danger:#d64545;
    --amber:#e0a531;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;
    background:var(--bg); color:var(--gray); padding:0 0 60px;
  }
  header{
    background:var(--gray); color:#fff; padding:28px 40px 22px;
  }
  header .brand{ display:flex; align-items:center; gap:10px; font-size:13px; letter-spacing:0.5px; opacity:.9;}
  header .brand-logo{ height:22px; width:auto; display:block; }
  header .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;}
  header h1{ margin:8px 0 4px; font-size:24px; font-weight:700;}
  header p{ margin:0; font-size:13px; opacity:.75;}
  .draft-badge{
    display:inline-block; margin-top:10px; background:rgba(13,153,106,0.18); color:#8fe6c6;
    border:1px solid rgba(13,153,106,0.5); padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600;
  }

  .tabs{
    display:flex; gap:4px; padding:0 40px; margin-top:-1px; background:var(--gray);
  }
  .tab{
    padding:12px 20px; font-size:14px; font-weight:600; color:rgba(255,255,255,0.6);
    cursor:pointer; border-bottom:3px solid transparent; user-select:none;
  }
  .tab.active{ color:#fff; border-bottom-color:var(--green); }

  .wrap{ max-width:1180px; margin:0 auto; padding:28px 40px 0; }
  .panel{ display:none; }
  .panel.active{ display:block; }

  .kpi-row{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:22px; }
  .kpi{
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px 20px;
  }
  .kpi .label{ font-size:12px; color:var(--gray-light); margin-bottom:6px; }
  .kpi .value{ font-size:26px; font-weight:700; color:var(--gray); }
  .kpi .value span.unit{ font-size:13px; font-weight:500; color:var(--gray-light); margin-left:2px;}
  .kpi .sub{ font-size:11.5px; color:var(--green); margin-top:4px; font-weight:600;}
  .kpi.warn .value{ color:var(--danger); }
  .kpi.warn .sub{ color:var(--danger); }

  .grid2{ display:grid; grid-template-columns:1.4fr 1fr; gap:16px; margin-bottom:16px; }
  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px; }
  .card{
    background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px 20px 12px;
  }
  .card h3{ margin:0 0 4px; font-size:14px; font-weight:700; color:var(--gray);}
  .card .desc{ font-size:11.5px; color:var(--gray-light); margin-bottom:10px;}
  canvas{ max-height:260px; }

  table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  th,td{ padding:7px 8px; border-bottom:1px solid var(--border); text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  th{ color:var(--gray-light); font-weight:600; font-size:11.5px; text-transform:uppercase; }
  tr:hover td{ background:var(--green-light); }
  .tag{ display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .tag.red{ background:#fdeaea; color:var(--danger);}
  .tag.gray{ background:#eee; color:var(--gray-light);}
  .tag.green{ background:var(--green-light); color:var(--green);}
  .tag.amber{ background:#fbf1de; color:var(--amber);}

  .footer-note{
    max-width:1180px; margin:24px auto 0; padding:0 40px 20px; font-size:11.5px; color:var(--gray-light); line-height:1.6;
  }
  .footer-note a{ color:var(--green); }
  .scroll-x{ overflow-x:auto; }

  .section-title{
    font-size:16px; font-weight:700; color:var(--gray); margin:26px 0 12px;
    padding-bottom:8px; border-bottom:2px solid var(--green);
  }
  .section-title .section-num{ color:var(--green); margin-right:6px; }

  .compare-box{ display:flex; align-items:center; justify-content:space-around; padding:8px 0 4px; }
  .compare-col{ text-align:center; }
  .compare-quarter{ font-size:12px; color:var(--gray-light); font-weight:600; }
  .compare-rate{ font-size:28px; font-weight:700; color:var(--gray); margin:4px 0; }
  .compare-sub{ font-size:11px; color:var(--gray-light); }
  .compare-arrow{ font-size:12px; color:var(--gray-light); font-weight:600; }
  .delta-note{ text-align:center; font-size:13px; font-weight:700; margin-top:6px; }

</style>
<style>

  html,body.gate-active{ background:#f4f6f9; }
  #gate-screen{
    max-width: 420px;
    margin: 120px auto;
    padding: 36px 32px;
    background:#fff;
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    text-align:center;
  }
  #gate-screen h2{
    color: #2E6248;
    font-size: 19px;
    margin-top:0;
    margin-bottom: 6px;
  }
  #gate-screen p{
    color:#666;
    font-size: 13.5px;
    margin-top:0;
    margin-bottom: 22px;
  }
  #gate-pw{
    width:100%;
    box-sizing:border-box;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid #C8DEDA;
    border-radius: 6px;
    margin-bottom: 14px;
  }
  #gate-btn{
    width:100%;
    padding: 10px 12px;
    font-size: 15px;
    font-weight:600;
    color:#fff;
    background: #46976E;
    border:none;
    border-radius: 6px;
    cursor:pointer;
  }
  #gate-btn:hover{ opacity:0.92; }
  #gate-error{
    color: #C0392B;
    font-size: 13px;
    min-height: 18px;
    margin-top: 10px;
  }
  #content-root{ display:none; }

</style>
</head>
<body class="gate-active">

<div id="gate-screen">
  <h2>🔒 비밀번호 보호 문서</h2>
  <p>서버 장애처리 · 디스크 관리 대시보드 — 열람하려면 비밀번호를 입력하세요.</p>
  <input type="password" id="gate-pw" placeholder="비밀번호 입력" autocomplete="off" />
  <button id="gate-btn">열기</button>
  <div id="gate-error"></div>
</div>

  function b64ToBuf(b64) {
    const bin = atob(b64);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf;
  }

  async function deriveKey(password, salt, iterations) {
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
  }

  async function tryDecrypt(password) {
    const salt = b64ToBuf(PAYLOAD.salt);
    const iv = b64ToBuf(PAYLOAD.iv);
    const ciphertext = b64ToBuf(PAYLOAD.ciphertext);
    const key = await deriveKey(password, salt, PAYLOAD.iterations);
    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
    return new TextDecoder().decode(plainBuf);
  }

  function runScripts(container) {
    const scripts = container.querySelectorAll('script');
    scripts.forEach(function(old) {
      const s = document.createElement('script');
      for (const attr of old.attributes) s.setAttribute(attr.name, attr.value);
      s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    });
  }

  async function unlock(password) {
    const errorEl = document.getElementById('gate-error');
    try {
      const html = await tryDecrypt(password);
      const root = document.getElementById('content-root');
      root.innerHTML = html;
      document.getElementById('gate-screen').style.display = 'none';
      root.style.display = 'block';
      document.body.classList.remove('gate-active');
      runScripts(root);
    } catch (e) {
      errorEl.textContent = '비밀번호가 올바르지 않습니다.';
    }
  }

  document.getElementById('gate-btn').addEventListener('click', function(){
    const pw = document.getElementById('gate-pw').value;
    unlock(pw);
  });
  document.getElementById('gate-pw').addEventListener('keydown', function(e){
    if (e.key === 'Enter') {
      const pw = document.getElementById('gate-pw').value;
      unlock(pw);
    }
  });
})();
</script>
