<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RMA 업무 백서 (비밀번호 보호)</title>
<style>
:root{
  --green:#46976E;
  --green-dark:#2E6248;
  --green-med:#67AA88;
  --green-light:#ECF5F0;
  --green-light2:#DEECE5;
  --ink:#33383A;
  --subink:#6B7573;
  --line:#C8DEDA;
  --red:#C0392B;
  --amber:#C9950C;
}
*{box-sizing:border-box;}
body{
  font-family:"Malgun Gothic","Apple SD Gothic Neo",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--ink);
  line-height:1.65;
  max-width:900px;
  margin:0 auto;
  padding:0 26px 100px;
  font-size:15.5px;
  background:#fff;
}
a{color:var(--green-dark);}
.cover{
  text-align:center;
  padding:56px 20px 40px;
  border-bottom:3px solid var(--green);
  margin-bottom:36px;
}
.cover-logo-img{ max-height:78px; margin-bottom:18px; }
.cover-logo-fallback{ display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:20px; }
.cover-logo-fallback .logo-mark{
  width:46px;height:46px;border-radius:50%;background:var(--green);
  color:#fff;font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center;
}
.cover-logo-fallback .logo-word{ font-size:22px; font-weight:700; color:var(--ink); letter-spacing:0.5px; }
.cover-eyebrow{
  color:var(--green-dark); font-weight:700; letter-spacing:2px; font-size:12.5px; text-transform:uppercase; margin-bottom:10px;
}
.cover-eyebrow .brand-lower{ text-transform:lowercase; }
.cover h1{
  font-size:32px; color:var(--ink); margin:0 0 10px; font-weight:800;
}
.cover p.cover-sub{
  color:var(--subink); font-size:15px; margin:0 0 26px;
}
table.meta{ width:100%; max-width:620px; margin:0 auto; border-collapse:collapse; text-align:left; }
table.meta td{ padding:8px 14px; border:1px solid var(--line); font-size:13.5px; }
table.meta td.k{ background:var(--green-light); color:var(--green-dark); font-weight:700; width:120px; }
h1{
  color:#fff;
  background:var(--green);
  font-size:19px;
  padding:10px 16px;
  border-radius:6px;
  margin-top:44px;
  margin-bottom:16px;
}
h1 .num{ opacity:0.75; font-weight:400; margin-right:6px; }
h2{
  color:var(--green-dark);
  font-size:16px;
  margin-top:26px;
  margin-bottom:10px;
  border-left:4px solid var(--green);
  padding-left:10px;
}
h3{ color:var(--ink); font-size:14.5px; margin-top:18px; margin-bottom:8px; }
p{ margin:8px 0; }
table{ border-collapse:collapse; width:100%; margin:10px 0 20px; font-size:14px; }
th,td{ border:1px solid var(--line); padding:8px 12px; text-align:left; vertical-align:top; }
thead th{ background:var(--green); color:#fff; font-weight:700; }
table.zebra tr:nth-child(even) td{ background:var(--green-light); }
table.zebra tr.head td{ background:var(--green); color:#fff; font-weight:700; }
.tag{ display:inline-block; padding:2px 9px; border-radius:10px; font-size:11.5px; font-weight:700; }
.tag.auto{ background:var(--green-light2); color:var(--green-dark); }
.tag.manual{ background:#F1F1F1; color:#666; }
.tag.partial{ background:#FFF3D6; color:#8a6d1c; }
ul,ol{ margin:8px 0 16px; padding-left:22px; }
li{ margin-bottom:6px; }
.note{ font-size:13.5px; color:var(--subink); background:var(--green-light); border-left:3px solid var(--green-med); padding:9px 12px; border-radius:4px; margin:12px 0; }
.note.warn{ background:#FDECEA; border-left-color:var(--red); color:#8a2c22; }
.note.tip{ background:#EAF6F2; border-left-color:var(--green); color:var(--green-dark); }
.mockup-wrap{ margin:14px 0 22px; }
.mockup-svg{ width:100%; height:auto; display:block; border-radius:8px; }
.mockup-caption{ font-size:12px; color:var(--subink); text-align:center; margin-top:6px; font-style:italic; }
.step-card{ border:1px solid var(--line); border-radius:8px; padding:18px 20px; margin:16px 0; background:#fff; }
.step-card .step-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
.step-card .step-title{ font-size:16px; font-weight:700; color:var(--ink); }
.toc{ background:var(--green-light); border-radius:8px; padding:18px 24px; margin:20px 0 32px; }
.toc h2{ margin-top:0; border:none; padding-left:0; }
.toc ol{ padding-left:20px; }
.toc a{ text-decoration:none; }
.contact-table td.role{ font-weight:700; color:var(--green-dark); white-space:nowrap; }
.flow-badge{ display:inline-flex; align-items:center; justify-content:center; width:26px;height:26px;border-radius:50%; background:var(--green); color:#fff; font-weight:700; font-size:12.5px; margin-right:8px; }
.meta-note{ color:var(--subink); font-size:12.5px; text-align:right; margin-top:70px; border-top:1px solid var(--line); padding-top:14px; }
.appendix-title{ color:var(--green-dark); }
.prompt-box{
  background:#28312D; color:#E8F3EE; border-radius:8px; padding:16px 18px; margin:12px 0 20px;
  font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace; font-size:12px; line-height:1.55;
  white-space:pre-wrap; word-break:break-word; overflow-x:auto; border:1px solid var(--green-dark);
}
.prompt-box .hl{ color:#8FE0BE; }
.prompt-label{ font-weight:700; color:var(--green-dark); margin:18px 0 4px; font-size:14.5px; }
.prompt-desc{ font-size:13.5px; color:var(--subink); margin:4px 0 10px; }
</style>
<style>
  html,body.gate-active{ background:#f4f6f9; }
  #gate-screen{
    max-width: 420px;
    margin: 120px auto;
    padding: 36px 32px;
    background:#fff;
    border-radius: 10px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    text-align:center;
  }
  #gate-screen h2{
    color: var(--green-dark);
    font-size: 19px;
    margin-top:0;
    margin-bottom: 6px;
  }
  #gate-screen p{
    color:#666;
    font-size: 13.5px;
    margin-top:0;
    margin-bottom: 22px;
  }
  #gate-pw{
    width:100%;
    box-sizing:border-box;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid var(--line);
    border-radius: 6px;
    margin-bottom: 14px;
  }
  #gate-btn{
    width:100%;
    padding: 10px 12px;
    font-size: 15px;
    font-weight:600;
    color:#fff;
    background: var(--green);
    border:none;
    border-radius: 6px;
    cursor:pointer;
  }
  #gate-btn:hover{ opacity:0.92; }
  #gate-error{
    color: var(--red);
    font-size: 13px;
    min-height: 18px;
    margin-top: 10px;
  }
  #content-root{ display:none; }
</style>
</head>
<body class="gate-active">

<div id="gate-screen">
  <h2>🔒 비밀번호 보호 문서</h2>
  <p>RMA 업무 백서 — 열람하려면 비밀번호를 입력하세요.</p>
  <input type="password" id="gate-pw" placeholder="비밀번호 입력" autocomplete="off" />
  <button id="gate-btn">열기</button>
  <div id="gate-error"></div>
</div>

<div id="content-root"></div>

  function b64ToBytes(b64) {
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    return arr;
  }

  async function tryDecrypt(password) {

    const saltBytes = b64ToBytes(PAYLOAD.salt);
    const ivBytes = b64ToBytes(PAYLOAD.iv);
    const cipherBytes = b64ToBytes(PAYLOAD.ciphertext);

    const baseKey = await crypto.subtle.importKey(
      "raw", enc.encode(password), { name: "PBKDF2" }, false, ["deriveKey"]
    );
    const aesKey = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: saltBytes, iterations: PAYLOAD.iterations, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
    const decrypted = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: ivBytes },
      aesKey,
      cipherBytes
    );
    return new TextDecoder().decode(decrypted);
  }

  function unlock(html) {
    document.getElementById('content-root').innerHTML = html;
    document.getElementById('content-root').style.display = 'block';
    document.getElementById('gate-screen').style.display = 'none';
    document.body.classList.remove('gate-active');
  }

  async function attempt() {
    const pwInput = document.getElementById('gate-pw');
    const errorEl = document.getElementById('gate-error');
    const password = pwInput.value;
    if (!password) return;
    errorEl.textContent = '';
    try {
      const html = await tryDecrypt(password);
      unlock(html);
    } catch (e) {
      errorEl.textContent = '비밀번호가 올바르지 않습니다.';
      pwInput.value = '';
      pwInput.focus();
    }
  }

  document.getElementById('gate-btn').addEventListener('click', attempt);
  document.getElementById('gate-pw').addEventListener('keydown', function(e){
    if (e.key === 'Enter') attempt();
  });
  document.getElementById('gate-pw').focus();
})();
</script>
